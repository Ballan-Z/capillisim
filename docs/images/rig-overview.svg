<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="520" fill="#fbfbfa"/>
  <text x="430" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1d2330">Rig overview — PC is the hub, projector + phone are dumb peripherals</text>

  <!-- throw cone -->
  <polygon points="392,150 168,430 616,430" fill="#ffe9a8" opacity="0.55"/>
  <line x1="392" y1="150" x2="168" y2="430" stroke="#e0b53a" stroke-width="1.5"/>
  <line x1="392" y1="150" x2="616" y2="430" stroke="#e0b53a" stroke-width="1.5"/>

  <!-- mount pole + projector -->
  <line x1="392" y1="92" x2="392" y2="150" stroke="#5a6170" stroke-width="6"/>
  <rect x="356" y="96" width="72" height="46" rx="10" fill="#ffffff" stroke="#3a4150" stroke-width="2.5"/>
  <circle cx="392" cy="146" r="8" fill="#cfd6e2" stroke="#3a4150" stroke-width="2"/>
  <text x="392" y="86" text-anchor="middle" font-size="13" font-weight="600" fill="#1d2330">MAGCUBIC HY320 (top-down)</text>

  <!-- table -->
  <rect x="150" y="430" width="486" height="16" fill="#d7c9a8" stroke="#a8966f" stroke-width="2"/>
  <!-- caps on table -->
  <g fill="#7b8aa0" stroke="#566273" stroke-width="0.8">
    <circle cx="180" cy="424" r="6"/><circle cx="196" cy="424" r="6"/><circle cx="212" cy="424" r="6"/>
    <circle cx="228" cy="424" r="6"/><circle cx="244" cy="424" r="6"/><circle cx="260" cy="424" r="6"/>
    <circle cx="276" cy="424" r="6"/><circle cx="292" cy="424" r="6"/><circle cx="308" cy="424" r="6"/>
    <circle cx="324" cy="424" r="6"/>
  </g>
  <!-- glowing target cell -->
  <circle cx="356" cy="424" r="8.5" fill="none" stroke="#37e35a" stroke-width="3"/>
  <circle cx="356" cy="424" r="13" fill="none" stroke="#37e35a" stroke-width="1.5" opacity="0.6"/>

  <!-- height bracket -->
  <line x1="120" y1="150" x2="120" y2="430" stroke="#3a4150" stroke-width="1.5" stroke-dasharray="5 4"/>
  <polygon points="120,150 116,162 124,162" fill="#3a4150"/>
  <polygon points="120,430 116,418 124,418" fill="#3a4150"/>
  <text x="108" y="296" text-anchor="middle" font-size="14" font-weight="700" fill="#1d2330" transform="rotate(-90 108 296)">H ≈ 0.80 m</text>

  <!-- width bracket -->
  <line x1="168" y1="470" x2="616" y2="470" stroke="#3a4150" stroke-width="1.5"/>
  <polygon points="168,470 180,466 180,474" fill="#3a4150"/>
  <polygon points="616,470 604,466 604,474" fill="#3a4150"/>
  <text x="392" y="492" text-anchor="middle" font-size="14" font-weight="700" fill="#1d2330">image ≈ 73 cm  (≈ 22 caps across)</text>

  <!-- laptop -->
  <g>
    <rect x="36" y="372" width="92" height="56" rx="4" fill="#ffffff" stroke="#3a4150" stroke-width="2.5"/>
    <rect x="28" y="428" width="108" height="8" rx="3" fill="#c7cedb" stroke="#3a4150" stroke-width="2"/>
    <text x="82" y="404" text-anchor="middle" font-size="12" font-weight="600" fill="#1d2330">PC</text>
  </g>
  <!-- HDMI cable laptop -> projector -->
  <path d="M120,378 C200,300 300,200 356,128" fill="none" stroke="#b0392f" stroke-width="2.5"/>
  <text x="232" y="250" font-size="13" font-weight="700" fill="#b0392f" transform="rotate(-38 232 250)">HDMI</text>

  <!-- phone on stand -->
  <g>
    <rect x="700" y="360" width="34" height="60" rx="6" fill="#1d2330" stroke="#000" stroke-width="1.5"/>
    <rect x="704" y="366" width="26" height="40" rx="2" fill="#9fd8ff"/>
    <line x1="717" y1="420" x2="717" y2="446" stroke="#5a6170" stroke-width="5"/>
    <line x1="700" y1="446" x2="734" y2="446" stroke="#5a6170" stroke-width="5"/>
    <text x="717" y="352" text-anchor="middle" font-size="12" font-weight="600" fill="#1d2330">phone</text>
  </g>
  <!-- phone reading zone (dashed) to table right -->
  <path d="M704,386 L612,420" fill="none" stroke="#3a4150" stroke-width="1.3" stroke-dasharray="4 4"/>
  <path d="M704,398 L612,432" fill="none" stroke="#3a4150" stroke-width="1.3" stroke-dasharray="4 4"/>
  <text x="648" y="402" font-size="11" fill="#3a4150">reading zone</text>

  <!-- wifi phone <-> PC -->
  <g stroke="#2b8a6e" stroke-width="2" fill="none">
    <path d="M150,330 q280,-70 540,0" opacity="0.0"/>
  </g>
  <text x="430" y="452" text-anchor="middle" font-size="0" fill="#000"> </text>
  <g fill="#2b8a6e">
    <text x="430" y="150" text-anchor="middle" font-size="13" font-weight="700">Wi-Fi: phone camera → PC (read cap colour)</text>
  </g>
  <path d="M150,338 C360,300 560,300 700,372" fill="none" stroke="#2b8a6e" stroke-width="2" stroke-dasharray="2 5"/>
</svg>
