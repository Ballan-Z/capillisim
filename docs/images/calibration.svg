<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="560" fill="#fbfbfa"/>
  <text x="380" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1d2330">Calibration — measure 4 projected markers, software solves the rest</text>
  <text x="380" y="58" text-anchor="middle" font-size="13" fill="#5a6170">(top-down view of the table; green crosshairs are what the projector paints)</text>

  <!-- table working area -->
  <rect x="120" y="92" width="520" height="380" fill="#fffdf5" stroke="#a8966f" stroke-width="2.5"/>

  <!-- origin corner -->
  <circle cx="120" cy="472" r="7" fill="#b0392f"/>
  <text x="132" y="492" font-size="13" font-weight="700" fill="#b0392f">origin (0,0) — taped corner</text>

  <!-- axes -->
  <line x1="120" y1="472" x2="300" y2="472" stroke="#b0392f" stroke-width="2"/>
  <polygon points="300,472 290,467 290,477" fill="#b0392f"/>
  <text x="250" y="466" font-size="13" font-weight="700" fill="#b0392f">+x</text>
  <line x1="120" y1="472" x2="120" y2="300" stroke="#b0392f" stroke-width="2"/>
  <polygon points="120,300 115,310 125,310" fill="#b0392f"/>
  <text x="92" y="380" font-size="13" font-weight="700" fill="#b0392f">+y</text>

  <!-- crosshair markers (4), numbered -->
  <g stroke="#1fb13f" stroke-width="3">
    <!-- 1 TL -->
    <line x1="182" y1="150" x2="222" y2="150"/><line x1="202" y1="130" x2="202" y2="170"/>
    <!-- 2 TR -->
    <line x1="538" y1="150" x2="578" y2="150"/><line x1="558" y1="130" x2="558" y2="170"/>
    <!-- 3 BR -->
    <line x1="538" y1="414" x2="578" y2="414"/><line x1="558" y1="394" x2="558" y2="434"/>
    <!-- 4 BL -->
    <line x1="182" y1="414" x2="222" y2="414"/><line x1="202" y1="394" x2="202" y2="434"/>
  </g>
  <g fill="#1fb13f" font-size="15" font-weight="800">
    <text x="228" y="146">1</text><text x="520" y="146">2</text>
    <text x="520" y="412">3</text><text x="228" y="412">4</text>
  </g>

  <!-- measure arrows to marker 2 -->
  <line x1="120" y1="486" x2="558" y2="486" stroke="#2b6cb0" stroke-width="1.6" stroke-dasharray="5 4"/>
  <polygon points="558,486 548,481 548,491" fill="#2b6cb0"/>
  <text x="330" y="504" text-anchor="middle" font-size="12" font-weight="700" fill="#2b6cb0">measure x (mm)</text>
  <line x1="104" y1="472" x2="104" y2="150" stroke="#2b6cb0" stroke-width="1.6" stroke-dasharray="5 4"/>
  <polygon points="104,150 99,160 109,160" fill="#2b6cb0"/>
  <text x="70" y="312" text-anchor="middle" font-size="12" font-weight="700" fill="#2b6cb0" transform="rotate(-90 70 312)">measure y (mm)</text>
  <line x1="558" y1="150" x2="558" y2="486" stroke="#2b6cb0" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="104" y1="150" x2="558" y2="150" stroke="#2b6cb0" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- verify bar -->
  <line x1="240" y1="300" x2="360" y2="300" stroke="#d9a400" stroke-width="5"/>
  <text x="300" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#b58700">100 mm verify bar</text>
  <text x="300" y="322" text-anchor="middle" font-size="11" fill="#5a6170">ruler must read 100 mm → true 1:1</text>

  <!-- steps -->
  <text x="380" y="528" text-anchor="middle" font-size="13" fill="#1d2330">For each marker type its measured "x y" → homography solved from 4 pairs → saved to table.json</text>
</svg>
